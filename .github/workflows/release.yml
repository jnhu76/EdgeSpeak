name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v0.2.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -q

      - name: Build exe
        run: uv run pyinstaller tts-tool.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeSpeak-Windows
          path: dist/tts-tool.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 \
            libglib2.0-0 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libwebkit2gtk-4.1-0 \
            libjavascriptcoregtk-4.1-0 \
            libdbus-glib-1-2 \
            libsdl2-2.0-0 \
            libx11-6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -q --ignore=tests/test_audio_player.py

      - name: Build binary
        run: uv run pyinstaller tts-tool.spec --clean --noconfirm

      - name: Package as AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/tts-tool AppDir/usr/bin/edgespeak
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp src/tts_tool/gui/icon.png AppDir/edgespeak.png 2>/dev/null || true
          cp src/tts_tool/gui/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/edgespeak.png 2>/dev/null || true

          printf '[Desktop Entry]\nType=Application\nName=EdgeSpeak\nComment=Cross-platform TTS desktop tool\nExec=edgespeak\nIcon=edgespeak\nCategories=Audio;Utility;\nTerminal=false\n' > AppDir/edgespeak.desktop

          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport PATH="$HERE/usr/bin:$PATH"\nexport LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"\nexec "$HERE/usr/bin/edgespeak" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun AppDir dist/EdgeSpeak-x86_64.AppImage

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: EdgeSpeak-Linux
          path: dist/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: EdgeSpeak-Windows
          path: ./dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: EdgeSpeak-Linux
          path: ./dist

      - name: Rename artifacts with platform
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv ./dist/tts-tool.exe ./dist/EdgeSpeak_win_amd64.exe || true
          mv ./dist/EdgeSpeak-x86_64.AppImage ./dist/EdgeSpeak_linux_amd64.AppImage || true
          mv ./dist/tts-tool ./dist/EdgeSpeak_linux_amd64 || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ./dist/EdgeSpeak_win_amd64.exe \
            ./dist/EdgeSpeak_linux_amd64.AppImage \
            ./dist/EdgeSpeak_linux_amd64 \
            --generate-notes