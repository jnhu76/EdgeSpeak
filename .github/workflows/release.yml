name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.1)'
        required: true
        default: 'v0.2.1'

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: resolve-tag
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -q

      - name: Build exe
        run: uv run pyinstaller tts-tool.spec --clean --noconfirm

      - name: Rename artifact
        shell: bash
        run: mv dist/tts-tool.exe dist/EdgeSpeak_win_amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeSpeak-Windows
          path: dist/EdgeSpeak_win_amd64.exe

  build-linux:
    needs: resolve-tag
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 \
            libglib2.0-0 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libwebkit2gtk-4.1-0 \
            libjavascriptcoregtk-4.1-0 \
            libdbus-glib-1-2 \
            libsdl2-2.0-0 \
            libx11-6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -q --ignore=tests/test_audio_player.py

      - name: Build binary
        run: uv run pyinstaller tts-tool.spec --clean --noconfirm

      - name: Package as AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/tts-tool AppDir/usr/bin/edgespeak
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp src/tts_tool/gui/icon.png AppDir/edgespeak.png 2>/dev/null || true
          cp src/tts_tool/gui/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/edgespeak.png 2>/dev/null || true

          printf '[Desktop Entry]\nType=Application\nName=EdgeSpeak\nComment=Cross-platform TTS desktop tool\nExec=edgespeak\nIcon=edgespeak\nCategories=Audio;Utility;\nTerminal=false\n' > AppDir/edgespeak.desktop

          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport PATH="$HERE/usr/bin:$PATH"\nexport LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"\nexec "$HERE/usr/bin/edgespeak" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun AppDir dist/EdgeSpeak_linux_amd64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeSpeak-Linux
          path: dist/EdgeSpeak_linux_amd64.AppImage

  release:
    needs: [resolve-tag, build-windows, build-linux]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: EdgeSpeak-Windows
          path: ./dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: EdgeSpeak-Linux
          path: ./dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets..."
            gh release upload "$TAG" ./dist/EdgeSpeak_win_amd64.exe ./dist/EdgeSpeak_linux_amd64.AppImage --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              ./dist/EdgeSpeak_win_amd64.exe \
              ./dist/EdgeSpeak_linux_amd64.AppImage \
              --generate-notes \
              --target master
          fi
